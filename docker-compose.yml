name: vector

services:
  backend:
    build: ./backend
    container_name: vector-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
      - backend-debug:/app/debug
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5m
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  backend-data:
    driver: local
  backend-debug:
    driver: local
