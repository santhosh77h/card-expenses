<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#0A0E1A"/>

  <!-- Status bar -->
  <rect x="20" y="12" width="40" height="6" rx="3" fill="#1E293B"/>
  <rect x="330" y="12" width="40" height="6" rx="3" fill="#1E293B"/>

  <!-- Header -->
  <text x="30" y="70" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="700" fill="#E2E8F0">Upload Statement</text>

  <!-- Upload area -->
  <rect x="20" y="100" width="350" height="280" rx="16" fill="#111827" stroke="#1E293B" stroke-width="2" stroke-dasharray="8 4"/>

  <!-- Upload icon (arrow up) -->
  <g transform="translate(170, 170)">
    <path d="M25 40 L25 10" stroke="#00E5A0" stroke-width="3" stroke-linecap="round"/>
    <path d="M15 20 L25 10 L35 20" fill="none" stroke="#00E5A0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="5" y="45" width="40" height="3" rx="1.5" fill="#00E5A0" fill-opacity="0.3"/>
  </g>

  <text x="195" y="240" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="600" fill="#E2E8F0">Drop your PDF here</text>
  <text x="195" y="265" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#64748B">or tap to browse files</text>

  <!-- Upload button -->
  <rect x="120" y="300" width="150" height="44" rx="22" fill="#00E5A0"/>
  <text x="195" y="327" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" font-weight="700" fill="#0A0E1A">Choose File</text>

  <!-- Supported banks section -->
  <text x="30" y="430" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="600" fill="#E2E8F0">Supported Banks</text>

  <!-- Bank cards row 1 -->
  <rect x="20" y="450" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="40" y="470" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="40" y="484" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <rect x="140" y="450" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="160" y="470" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="160" y="484" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <rect x="260" y="450" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="280" y="470" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="280" y="484" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <!-- Bank cards row 2 -->
  <rect x="20" y="520" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="40" y="540" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="40" y="554" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <rect x="140" y="520" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="160" y="540" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="160" y="554" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <rect x="260" y="520" width="108" height="60" rx="10" fill="#111827"/>
  <rect x="280" y="540" width="68" height="8" rx="4" fill="#1E293B"/>
  <rect x="280" y="554" width="40" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <!-- Privacy note -->
  <rect x="20" y="610" width="350" height="70" rx="12" fill="#111827"/>
  <circle cx="50" cy="645" r="14" fill="#00E5A0" fill-opacity="0.15"/>
  <rect x="75" y="630" width="200" height="8" rx="4" fill="#1E293B"/>
  <rect x="75" y="645" width="260" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="75" y="657" width="180" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <!-- Bottom nav bar -->
  <rect x="0" y="784" width="390" height="60" fill="#111827"/>
  <circle cx="65" cy="810" r="12" fill="#1E293B"/>
  <rect x="53" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
  <circle cx="150" cy="810" r="12" fill="#00E5A0" fill-opacity="0.3"/>
  <rect x="138" y="826" width="24" height="4" rx="2" fill="#00E5A0"/>
  <circle cx="235" cy="810" r="12" fill="#1E293B"/>
  <rect x="223" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
  <circle cx="320" cy="810" r="12" fill="#1E293B"/>
  <rect x="308" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
</svg>
