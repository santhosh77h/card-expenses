<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844">
  <!-- Background -->
  <rect width="390" height="844" fill="#0A0E1A"/>

  <!-- Status bar -->
  <rect x="20" y="12" width="40" height="6" rx="3" fill="#1E293B"/>
  <rect x="330" y="12" width="40" height="6" rx="3" fill="#1E293B"/>

  <!-- Header -->
  <text x="30" y="70" font-family="'Inter', Arial, sans-serif" font-size="24" font-weight="700" fill="#E2E8F0">Analysis</text>
  <rect x="280" y="55" width="90" height="28" rx="14" fill="#111827"/>
  <rect x="295" y="65" width="60" height="6" rx="3" fill="#1E293B"/>

  <!-- Donut chart -->
  <g transform="translate(195, 210)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#1E293B" stroke-width="20"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#00E5A0" stroke-width="20"
            stroke-dasharray="125 377" stroke-dashoffset="0" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3B82F6" stroke-width="20"
            stroke-dasharray="90 412" stroke-dashoffset="-125" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#F59E0B" stroke-width="20"
            stroke-dasharray="70 432" stroke-dashoffset="-215" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#EF4444" stroke-width="20"
            stroke-dasharray="50 452" stroke-dashoffset="-285" transform="rotate(-90)"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#8B5CF6" stroke-width="20"
            stroke-dasharray="45 457" stroke-dashoffset="-335" transform="rotate(-90)"/>
    <!-- Center text -->
    <text x="0" y="-8" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#64748B">Total</text>
    <text x="0" y="16" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">$4,250</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 320)">
    <circle cx="8" cy="8" r="5" fill="#00E5A0"/>
    <rect x="22" y="4" width="60" height="7" rx="3.5" fill="#1E293B"/>
    <rect x="130" y="4" width="40" height="7" rx="3.5" fill="#1E293B" fill-opacity="0.5"/>

    <circle cx="190" cy="8" r="5" fill="#3B82F6"/>
    <rect x="204" y="4" width="55" height="7" rx="3.5" fill="#1E293B"/>
    <rect x="310" y="4" width="35" height="7" rx="3.5" fill="#1E293B" fill-opacity="0.5"/>
  </g>
  <g transform="translate(30, 345)">
    <circle cx="8" cy="8" r="5" fill="#F59E0B"/>
    <rect x="22" y="4" width="50" height="7" rx="3.5" fill="#1E293B"/>
    <rect x="130" y="4" width="35" height="7" rx="3.5" fill="#1E293B" fill-opacity="0.5"/>

    <circle cx="190" cy="8" r="5" fill="#EF4444"/>
    <rect x="204" y="4" width="70" height="7" rx="3.5" fill="#1E293B"/>
    <rect x="310" y="4" width="30" height="7" rx="3.5" fill="#1E293B" fill-opacity="0.5"/>
  </g>

  <!-- Monthly trend section -->
  <text x="30" y="400" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="600" fill="#E2E8F0">Monthly Trend</text>

  <rect x="20" y="415" width="350" height="160" rx="12" fill="#111827"/>
  <!-- Bar chart -->
  <rect x="50" y="520" width="30" height="40" rx="4" fill="#1E293B"/>
  <rect x="95" y="500" width="30" height="60" rx="4" fill="#1E293B"/>
  <rect x="140" y="490" width="30" height="70" rx="4" fill="#00E5A0" fill-opacity="0.3"/>
  <rect x="185" y="510" width="30" height="50" rx="4" fill="#1E293B"/>
  <rect x="230" y="480" width="30" height="80" rx="4" fill="#00E5A0" fill-opacity="0.5"/>
  <rect x="275" y="460" width="30" height="100" rx="4" fill="#00E5A0"/>
  <!-- Month labels -->
  <rect x="50" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="95" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="140" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="185" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="230" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>
  <rect x="275" y="565" width="24" height="5" rx="2.5" fill="#1E293B" fill-opacity="0.5"/>

  <!-- Insights cards -->
  <text x="30" y="620" font-family="'Inter', Arial, sans-serif" font-size="16" font-weight="600" fill="#E2E8F0">Insights</text>

  <rect x="20" y="635" width="170" height="90" rx="12" fill="#111827"/>
  <rect x="38" y="655" width="70" height="7" rx="3.5" fill="#1E293B"/>
  <text x="38" y="685" font-family="'Inter', Arial, sans-serif" font-size="20" font-weight="700" fill="#00E5A0">+12%</text>
  <rect x="38" y="698" width="100" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <rect x="200" y="635" width="170" height="90" rx="12" fill="#111827"/>
  <rect x="218" y="655" width="80" height="7" rx="3.5" fill="#1E293B"/>
  <text x="218" y="685" font-family="'Inter', Arial, sans-serif" font-size="20" font-weight="700" fill="#E2E8F0">47</text>
  <rect x="218" y="698" width="110" height="6" rx="3" fill="#1E293B" fill-opacity="0.5"/>

  <!-- Bottom nav bar -->
  <rect x="0" y="784" width="390" height="60" fill="#111827"/>
  <circle cx="65" cy="810" r="12" fill="#1E293B"/>
  <rect x="53" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
  <circle cx="150" cy="810" r="12" fill="#1E293B"/>
  <rect x="138" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
  <circle cx="235" cy="810" r="12" fill="#00E5A0" fill-opacity="0.3"/>
  <rect x="223" y="826" width="24" height="4" rx="2" fill="#00E5A0"/>
  <circle cx="320" cy="810" r="12" fill="#1E293B"/>
  <rect x="308" y="826" width="24" height="4" rx="2" fill="#1E293B"/>
</svg>
